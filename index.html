<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #333;
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
      padding: 100px 20px;
    }

    header h1 {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    header p {
      font-size: 1.2rem;
      opacity: 0.9;
      max-width: 600px;
      margin: 0 auto;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
      max-width: 960px;
      margin: 0 auto;
      padding: 80px 20px;
    }

    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      transition: box-shadow 0.2s;
    }

    .card:hover {
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }

    .card .icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
    }

    .card h3 {
      margin-bottom: 8px;
      font-size: 1.25rem;
    }

    .card p {
      color: #666;
      font-size: 0.95rem;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      background: #f7f8fa;
      color: #888;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Hello, World</h1>
    <p>깔끔하고 심플한 1페이지 웹사이트입니다.</p>
  </header>

  <section class="features">
    <div class="card">
      <div class="icon">&#9889;</div>
      <h3>빠른 속도</h3>
      <p>가벼운 순수 HTML/CSS로 빠르게 로딩됩니다.</p>
    </div>
    <div class="card">
      <div class="icon">&#127912;</div>
      <h3>깔끔한 디자인</h3>
      <p>모던하고 심플한 레이아웃을 제공합니다.</p>
    </div>
    <div class="card">
      <div class="icon">&#128241;</div>
      <h3>반응형</h3>
      <p>모바일, 태블릿, 데스크톱 모두 지원합니다.</p>
    </div>
  </section>

  <footer>
    &copy; 2026. All rights reserved.
  </footer>
</body>
</html>
